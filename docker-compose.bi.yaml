# Lean 2-service Conversational BI stack
#
# Usage:
#   docker compose -f docker-compose.bi.yaml up
#
# Drop your JSON files into ./data/uploads/ before (or after) starting.
# The app ingests them automatically on startup, then stays up for queries.
#
# Cost: $0 — CPU-only Ollama, embedded Qdrant, no cloud APIs.
#
# Ports:
#   http://localhost:8001  →  Conversational BI UI
#   http://localhost:11434 →  Ollama API (optional, for debugging)

services:

  # ── Ollama (CPU) ────────────────────────────────────────────────────────────
  # Serves both the LLM (mistral) and the embedding model (nomic-embed-text).
  # Models are downloaded on first run and cached in the ./models volume.
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ./models:/root/.ollama        # persist downloaded models across restarts
    healthcheck:
      test: ["CMD", "sh", "-c", "ollama list > /dev/null 2>&1"]
      interval: 10s
      retries: 6
      start_period: 15s
      timeout: 5s

  # ── Conversational BI app ───────────────────────────────────────────────────
  # Runs PrivateGPT/Zylon with the bi-local profile.
  # On startup: ingests any JSON files in /data/uploads, then serves the UI.
  conv-bi:
    # Use a local image name so Docker Compose always builds from source
    # rather than pulling zylonai/private-gpt from Docker Hub (which lacks
    # our custom scripts).  Run `make docker-build` to rebuild after changes.
    image: conv-bi:local
    user: root
    build:
      context: .
      dockerfile: Dockerfile.ollama
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8001:8001"
    volumes:
      - ./local_data:/home/worker/app/local_data        # Qdrant index + docstore
      - ./data/uploads:/home/worker/app/data/uploads    # drop raw JSON files here
      - ./data/aggregated:/home/worker/app/data/aggregated  # aggregated summaries (auto-generated)
    environment:
      PORT: 8001
      PGPT_PROFILES: bi                # loads settings-bi.yaml on top of settings.yaml
      PGPT_MODE: ollama
      PGPT_EMBED_MODE: ollama
      PGPT_OLLAMA_API_BASE: http://ollama:11434
    # Pipeline: aggregate raw JSON → embed summaries → serve the UI
    # Each step is idempotent: re-running just re-ingests updated summaries.
    #
    # List form + | literal scalar avoids the YAML > folding / shlex.split
    # issue where argument lines become separate sh commands.
    entrypoint:
      - sh
      - -c
      - |
        python scripts/prepare_bi_data.py /home/worker/app/data/uploads /home/worker/app/data/aggregated &&
        python scripts/ingest_bi_json.py /home/worker/app/data/aggregated &&
        python -m private_gpt
