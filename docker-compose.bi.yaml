# Lean 2-service Conversational BI stack
#
# Usage:
#   docker compose -f docker-compose.bi.yaml up
#
# Drop your JSON files into ./local_data/uploads/ before (or after) starting.
# The app aggregates them into local_data/bi.db on startup, then serves text-to-SQL queries.
#
# Cost: $0 — CPU-only Ollama, DuckDB persistent file, no vector DB.
#
# Ports:
#   http://localhost:8001  →  Conversational BI UI
#   http://localhost:11434 →  Ollama API (optional, for debugging)

networks:
  bi-net:
    driver: bridge

services:

  # ── Ollama (CPU) ────────────────────────────────────────────────────────────
  # Serves duckdb-nsql:7b for text-to-SQL generation.
  # Models are downloaded on first run and cached in the ./models volume.
  ollama:
    image: ollama/ollama:latest
    networks:
      - bi-net
    ports:
      - "11434:11434"
    volumes:
      - ./models:/root/.ollama        # persist downloaded models across restarts
    healthcheck:
      test: ["CMD", "sh", "-c", "ollama list > /dev/null 2>&1"]
      interval: 10s
      retries: 6
      start_period: 15s
      timeout: 5s

  # ── Conversational BI app ───────────────────────────────────────────────────
  # Runs PrivateGPT/Zylon with the bi-local profile.
  # On startup: aggregates uploads → parquet, then serves text-to-SQL queries.
  conv-bi:
    # Use a local image name so Docker Compose always builds from source
    # rather than pulling zylonai/private-gpt from Docker Hub (which lacks
    # our custom scripts).  Run `make docker-build` to rebuild after changes.
    image: private-bi-gpt:local
    user: root
    networks:
      - bi-net
    build:
      context: .
      dockerfile: Dockerfile.ollama
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8001:8001"
    volumes:
      - ./local_data:/home/worker/app/local_data        # app state, uploads, bi.db
    environment:
      PORT: 8001
      PGPT_PROFILES: bi                # loads settings-bi.yaml on top of settings.yaml
      PGPT_MODE: ollama
      PGPT_OLLAMA_API_BASE: http://ollama:11434
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}   # required for Claude MCP client
    # Pipeline: aggregate raw JSON → bi.db (DuckDB) → serve text-to-SQL UI
    # No vector ingestion step needed (DuckDB reads native tables at query time).
    #
    # List form + | literal scalar avoids the YAML > folding / shlex.split
    # issue where argument lines become separate sh commands.
    entrypoint:
      - sh
      - -c
      - |
        python scripts/prepare_bi_data.py /home/worker/app/local_data/uploads /home/worker/app/local_data/bi.db &&
        python -m private_gpt
