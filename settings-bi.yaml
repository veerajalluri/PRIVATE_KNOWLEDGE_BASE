# Conversational BI configuration — layered on top of settings.yaml
# Activate with: PGPT_PROFILES=bi
#
# Architecture: text-to-SQL via Claude + DuckDB MCP server.
# Claude uses get_schema / execute_sql MCP tools to query the DuckDB database.
# Requires: ANTHROPIC_API_KEY environment variable.

server:
  env_name: bi

llm:
  mode: ollama
  max_new_tokens: 512     # SQL responses are short
  context_window: 8192
  temperature: 0.0        # Deterministic SQL generation

embedding:
  mode: ollama            # override base huggingface default; embeddings-huggingface not installed

ui:
  enabled: true
  default_mode: "RAG"     # "RAG" mode now triggers the text-to-SQL pipeline
  default_chat_system_prompt: >
    You are a helpful business intelligence assistant.
    Answer questions clearly and concisely based on the data available.
  default_query_system_prompt: >
    You are a business intelligence analyst using DuckDB-NSQL.
    Generate accurate SQL to answer the user's question from the available tables.

data:
  local_data_folder: local_data/private_gpt
  local_ingestion:
    enabled: true
    allow_ingest_from: ["*"]

ollama:
  llm_model: duckdb-nsql
  embedding_model: nomic-embed-text  # kept for basic chat mode fallback
  api_base: http://ollama:11434          # docker service name inside compose network
  embedding_api_base: http://ollama:11434
  keep_alive: 5m
  request_timeout: 300.0                 # 5 min — 7B model on CPU is slow
  autopull_models: true                  # pull models automatically on first run

anthropic:
  api_key: ${ANTHROPIC_API_KEY:}
  model: claude-opus-4-6
