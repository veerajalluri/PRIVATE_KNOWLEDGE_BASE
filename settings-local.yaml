server:
  env_name: local

llm:
  mode: ollama          # Local LLM, zero API cost
  max_new_tokens: 1024  # BI answers can be long
  context_window: 8192  # Mistral supports 8k context
  temperature: 0.05     # Low = factual, deterministic
  prompt_style: mistral

embedding:
  mode: ollama
  ingest_mode: simple
  model: nomic-embed-text  # Fast, free, good for structured data

vectorstore:
  database: qdrant       # Built into Zylon, no separate service needed

rag:
  similarity_top_k: 10   # Retrieve more records for aggregation queries

data:
  local_data_folder: local_data/private_gpt
  local_ingestion:
    enabled: true
    allow_ingest_from: ["*"]

ui:
  enabled: true          # Zylon ships with a basic chat UI
  default_mode: "RAG"
  default_query_system_prompt: >
    You are a business intelligence analyst. The context below contains
    structured business records retrieved from the data store.
    Answer the user's question using only the information in the context.
    For numeric questions, compute totals, averages, or counts from the
    records shown. Always mention how many records support your answer.
    If the answer cannot be derived from the context, say so clearly —
    do not guess or fabricate figures.

ollama:
  llm_model: mistral
  embedding_model: nomic-embed-text
  api_base: http://localhost:11434
  embedding_api_base: http://localhost:11434
  autopull_models: true